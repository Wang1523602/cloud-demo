#网关核心：路由，断言，过滤器

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: '*'
            allowed-methods: '*'
            allowed-headers: '*'

      routes:               #路由
        - id: bing-route
          uri: https://cn.bing.com/
          predicates:
            - name: Path
              args:
                patterns: /search
            - name: Query
              args:
                param: q
                regexp: haha
            #            - vip=user,wangshuo
            - name: Vip
              args:
                param: user
                value: wangshuo
          order: 10
          metadata:
            hello : world

        - id: order-route
          uri: lb://service-order
          predicates:       #断言
            - name: Path
              args:
                patterns: /api/order/**
                matchTrailingSlash: true
          filters:          #过滤器
            - RewritePath=/api/order/?(?<segment>.*), /$\{segment}
            - OnceToken=X-Response-Token,jwt
          order: 1

        - id: product-route
          uri: lb://service-product
          predicates:
            - Path=/api/product/**
          filters:
            - RewritePath=/api/product/?(?<segment>.*), /$\{segment}
          order: 2
      default-filters:
        - AddResponseHeader=X-Response-Abc, 123
